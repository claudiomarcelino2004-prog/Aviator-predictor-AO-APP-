<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVIATOR AO PRO — Motor Quântico #1 Angola</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --g1:#00FF41;--g2:#00E676;--g3:#00C853;--g4:#69F0AE;
  --dark:#000;--dark2:#020802;--dark3:#041008;
  --card:rgba(0,255,65,0.05);--card2:rgba(0,255,65,0.09);
  --border:rgba(0,255,65,0.15);--border2:rgba(0,255,65,0.35);
  --gold:#FFD700;--red:#FF1744;--cyan:#00BCD4;
  --text:#E0FFE8;--muted:#4A7A55;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;}

/* MATRIX CANVAS */
#matrixCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.18;pointer-events:none;}

/* PAGES */
.page{display:none;position:relative;z-index:1;}
.page.active{display:block;}

/* ═══ HEADER ═══ */
header{position:sticky;top:0;z-index:300;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;}
.hdr{display:flex;align-items:center;justify-content:space-between;height:52px;}
.logo{display:flex;align-items:center;gap:8px;font-family:'Orbitron',monospace;font-weight:900;font-size:.9rem;letter-spacing:2px;}
.logo-box{width:34px;height:34px;background:linear-gradient(135deg,var(--g3),var(--g1));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 0 14px rgba(0,255,65,.5);}
.logo em{color:var(--g1);font-style:normal;text-shadow:0 0 10px rgba(0,255,65,.5);}
.badge-live{display:flex;align-items:center;gap:5px;background:rgba(0,255,65,.07);border:1px solid rgba(0,255,65,.3);padding:4px 10px;border-radius:50px;font-size:.7rem;font-weight:700;color:var(--g2);letter-spacing:1px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--g2);animation:pg 1.2s infinite;}
@keyframes pg{0%,100%{box-shadow:0 0 0 0 rgba(0,255,65,.8);}50%{box-shadow:0 0 0 5px rgba(0,255,65,0);}}

/* ═══════════════════════
   PAGE 1 — LANDING
═══════════════════════ */
.announce{background:linear-gradient(90deg,var(--dark3),rgba(0,255,65,.1),var(--dark3));border-bottom:1px solid var(--border);padding:8px 16px;text-align:center;font-size:.72rem;font-weight:700;color:var(--g1);letter-spacing:2px;animation:fadeIn .5s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.hero{text-align:center;padding:50px 16px 34px;position:relative;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,255,65,0.07),transparent 65%);}
.hero-tag{display:inline-flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--border2);color:var(--g1);padding:5px 14px;border-radius:50px;font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
.hero h1{font-family:'Orbitron',monospace;font-size:1.85rem;font-weight:900;line-height:1.2;margin-bottom:12px;}
.hero h1 .l1{display:block;color:#fff;}
.hero h1 .l2{display:block;color:var(--g1);text-shadow:0 0 20px rgba(0,255,65,.5);}
.hero-sub{font-size:.97rem;color:var(--muted);max-width:330px;margin:0 auto 22px;line-height:1.7;}
.hero-sub strong{color:var(--text);}
.proof-row{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin-bottom:24px;}
.pp{background:rgba(0,255,65,.06);border:1px solid var(--border);color:var(--g2);padding:4px 10px;border-radius:50px;font-size:.76rem;font-weight:700;}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:350px;margin:0 auto 26px;}
.hstat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 6px;text-align:center;position:relative;overflow:hidden;}
.hstat::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--g1),transparent);}
.hstat-n{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;color:var(--g1);text-shadow:0 0 10px rgba(0,255,65,.4);}
.hstat-l{font-size:.66rem;color:var(--muted);margin-top:3px;}
.hero-btns{display:flex;flex-direction:column;gap:9px;max-width:350px;margin:0 auto;}
.btn-main{background:linear-gradient(135deg,var(--g3),var(--g1));border:none;border-radius:14px;color:#000;font-family:'Orbitron',monospace;font-size:.86rem;font-weight:900;padding:17px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;box-shadow:0 4px 26px rgba(0,255,65,.4);transition:all .3s;text-decoration:none;display:block;text-align:center;}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(0,255,65,.6);}
.btn-ghost{background:transparent;border:1px solid var(--border2);border-radius:14px;color:var(--g2);font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;padding:13px;cursor:pointer;text-align:center;display:block;text-decoration:none;}

/* URGENCY */
.urg{margin:24px auto;max-width:480px;padding:0 14px;}
.urg-box{background:rgba(0,255,65,.04);border:1px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:11px;}
.urg-icon{font-size:1.7rem;flex-shrink:0;animation:sk 2s infinite;}
@keyframes sk{0%,100%{transform:rotate(0);}20%{transform:rotate(-10deg);}40%{transform:rotate(10deg);}60%{transform:rotate(0);}}
.urg-t{font-size:.83rem;line-height:1.6;}
.urg-t strong{color:var(--g1);font-family:'Orbitron',monospace;}

/* TICKER */
.ticker{overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px 0;background:rgba(0,255,65,.02);}
.ticker-track{display:flex;gap:12px;animation:tk 32s linear infinite;width:max-content;}
@keyframes tk{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.tc{flex-shrink:0;display:flex;align-items:center;gap:5px;background:rgba(0,255,65,.07);border:1px solid rgba(0,255,65,.18);padding:4px 12px;border-radius:50px;font-size:.77rem;font-weight:700;color:var(--g2);}
.tc .tm{font-family:'Orbitron',monospace;font-size:.79rem;color:#fff;}

/* SECTIONS */
.sec{padding:0 14px 28px;max-width:480px;margin:0 auto;}
.sh{text-align:center;margin-bottom:16px;}
.sh h2{font-family:'Orbitron',monospace;font-size:1.08rem;font-weight:700;letter-spacing:1.5px;color:var(--g1);}
.sh p{color:var(--muted);font-size:.84rem;margin-top:4px;}
.rl{width:36px;height:2px;margin:7px auto 0;background:linear-gradient(90deg,var(--g3),var(--g1));border-radius:50px;}

/* WINS */
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.wcard{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px;position:relative;overflow:hidden;}
.wcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--g1),transparent);}
.wm{font-family:'Orbitron',monospace;font-size:1.35rem;font-weight:900;color:var(--gold);line-height:1;margin-bottom:2px;}
.wp{font-size:.7rem;color:var(--muted);}
.wc{font-size:.77rem;font-weight:700;color:var(--g2);}
.wt{font-size:.67rem;color:var(--muted);}
.wb{position:absolute;top:7px;right:7px;background:rgba(0,255,65,.1);border:1px solid rgba(0,255,65,.2);color:var(--g2);font-size:.63rem;font-weight:700;padding:2px 6px;border-radius:50px;}
.wbig{grid-column:1/-1;background:linear-gradient(135deg,rgba(0,255,65,.06),rgba(0,188,212,.04));}
.wbig .wm{font-size:2rem;}

/* TESTIMONIALS */
.tlist{display:flex;flex-direction:column;gap:9px;}
.tcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;position:relative;overflow:hidden;}
.tcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--g3),transparent);}
.stars{color:var(--gold);font-size:.84rem;margin-bottom:6px;}
.ttext{font-size:.88rem;line-height:1.7;margin-bottom:12px;}
.tfoot{display:flex;align-items:center;gap:8px;}
.tav{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--g3),var(--g1));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.9rem;color:#000;border:2px solid var(--border2);}
.tname{font-weight:700;font-size:.88rem;}
.tinfo{font-size:.69rem;color:var(--muted);margin-top:1px;}
.tearned{margin-left:auto;flex-shrink:0;background:rgba(0,255,65,.08);border:1px solid rgba(0,255,65,.18);color:var(--g1);padding:4px 8px;border-radius:8px;font-family:'Orbitron',monospace;font-size:.72rem;font-weight:700;}

/* FEATURES */
.feats{display:flex;flex-direction:column;gap:7px;}
.feat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px;display:flex;gap:11px;align-items:flex-start;}
.feat-ic{width:42px;height:42px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.25rem;background:rgba(0,255,65,.06);border:1px solid var(--border2);}
.feat-t{font-size:.9rem;font-weight:700;margin-bottom:3px;color:var(--g1);}
.feat-d{font-size:.79rem;color:var(--muted);line-height:1.6;}

/* COMPARISON */
.cmp{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.cmp-h{display:grid;grid-template-columns:1fr 1fr 1fr;padding:10px 12px;border-bottom:1px solid var(--border);font-size:.69rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.cmp-h .ours{color:var(--g1);font-family:'Orbitron',monospace;}
.cmp-r{display:grid;grid-template-columns:1fr 1fr 1fr;padding:9px 12px;border-bottom:1px solid rgba(0,255,65,.05);font-size:.79rem;}
.cmp-r:last-child{border-bottom:none;}
.cmp-r .fn{color:var(--muted);}
.yes{color:var(--g2);font-weight:700;text-align:center;}
.no{color:#2a2a2a;text-align:center;}
.ov{color:var(--g1);font-weight:700;text-align:center;}

/* GATE */
.gate-wrap{max-width:480px;margin:0 auto;padding:0 14px;}
.gate-card{background:var(--card);border:2px solid var(--border2);border-radius:20px;padding:24px 17px;text-align:center;box-shadow:0 0 40px rgba(0,255,65,.08);position:relative;overflow:hidden;}
.gate-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--g1),transparent);}
.gate-icon{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--g3),var(--g1));display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 12px;box-shadow:0 0 20px rgba(0,255,65,.4);}
.gate-title{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;margin-bottom:5px;color:var(--g1);}
.gate-sub{font-size:.83rem;color:var(--muted);margin-bottom:17px;line-height:1.7;}
.gate-sub strong{color:var(--text);}
.gate-feats{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:16px;}
.gf{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:.74rem;display:flex;align-items:center;gap:5px;color:var(--text);}
.gate-input{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:11px;color:var(--g1);font-family:'Orbitron',monospace;font-size:.92rem;padding:14px 15px;letter-spacing:4px;text-align:center;outline:none;margin-bottom:9px;transition:all .3s;}
.gate-input:focus{border-color:var(--g1);box-shadow:0 0 16px rgba(0,255,65,.15);}
.gate-input::placeholder{color:var(--muted);letter-spacing:2px;font-size:.76rem;}
.gate-input.err{border-color:var(--red);animation:sh .4s;}
@keyframes sh{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
.gate-error{color:var(--red);font-size:.78rem;margin-bottom:8px;display:none;font-weight:600;}
.btn-access{width:100%;background:linear-gradient(135deg,var(--g3),var(--g1));border:none;border-radius:12px;color:#000;font-family:'Orbitron',monospace;font-size:.86rem;font-weight:900;padding:16px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;box-shadow:0 4px 24px rgba(0,255,65,.4);transition:all .3s;}
.btn-access:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(0,255,65,.6);}
.gate-note{font-size:.72rem;color:var(--muted);margin-top:10px;}
.gate-note a{color:var(--g1);font-weight:700;text-decoration:none;}

.cta-sec{padding:30px 14px;text-align:center;}
.cta-sec h2{font-family:'Orbitron',monospace;font-size:1.05rem;font-weight:900;margin-bottom:7px;color:var(--g1);}
.cta-sec p{color:var(--muted);font-size:.86rem;margin-bottom:16px;line-height:1.6;}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:360px;margin:0 auto 9px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;text-decoration:none;font-family:'Orbitron',monospace;font-weight:700;font-size:.82rem;letter-spacing:1px;padding:16px;border-radius:13px;text-align:center;box-shadow:0 4px 24px rgba(37,211,102,.28);transition:all .3s;}
.btn-wa:hover{transform:translateY(-2px);}
.guarantee{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:rgba(0,255,65,.05);border:1px solid var(--border);padding:7px 13px;border-radius:50px;font-size:.74rem;color:var(--g2);font-weight:600;}

/* ═══════════════════════
   PAGE 2 — BOT MATRIX
═══════════════════════ */
.bot-topbar{background:rgba(0,0,0,.95);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:48px;position:sticky;top:0;z-index:200;backdrop-filter:blur(16px);}
.bot-back{background:none;border:none;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:.83rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;}
.bot-ttl{font-family:'Orbitron',monospace;font-size:.78rem;font-weight:700;color:var(--g1);text-shadow:0 0 8px rgba(0,255,65,.4);}
.bot-st{display:flex;align-items:center;gap:4px;font-size:.68rem;color:var(--g2);font-weight:700;}

/* STATS DASHBOARD */
.stats-dash{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px 0;}
.sd-card{background:rgba(0,0,0,.6);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center;position:relative;overflow:hidden;}
.sd-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--g1),transparent);}
.sd-card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,255,65,.04),transparent 70%);}
.sd-icon{font-size:1.6rem;margin-bottom:7px;position:relative;z-index:1;}
.sd-val{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:900;position:relative;z-index:1;}
.sd-val.green{color:var(--g1);text-shadow:0 0 12px rgba(0,255,65,.5);}
.sd-val.gold{color:var(--gold);text-shadow:0 0 12px rgba(255,215,0,.4);}
.sd-val.orange{color:#FF6D00;text-shadow:0 0 12px rgba(255,109,0,.4);}
.sd-val.cyan{color:var(--cyan);text-shadow:0 0 12px rgba(0,188,212,.4);}
.sd-lbl{font-size:.66rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px;position:relative;z-index:1;}

/* PLATFORM SELECTOR */
.plat-section{padding:12px 14px 0;}
.plat-lbl{font-size:.66rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:9px;font-weight:700;}
.plat-grid-bot{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.plat-card{background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:12px;padding:10px 4px;cursor:pointer;text-align:center;transition:all .2s;position:relative;}
.plat-card.active{background:rgba(0,255,65,.08);border-color:var(--g1);box-shadow:0 0 12px rgba(0,255,65,.2);}
.plat-card.active::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--g1),transparent);}
.plat-emoji{font-size:1.3rem;margin-bottom:3px;}
.plat-name{font-size:.64rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.plat-pct{font-size:.6rem;color:var(--g2);font-weight:700;margin-top:1px;}
.plat-pct span{color:var(--g1);}

/* MAIN SIGNAL CARD */
.signal-main{margin:12px 14px 0;position:relative;}
.sig-matrix-bg{position:absolute;inset:0;border-radius:22px;overflow:hidden;pointer-events:none;}
.sig-card-inner{background:rgba(0,0,0,.75);border:1px solid var(--border2);border-radius:22px;overflow:hidden;position:relative;}
.sig-card-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--g1),var(--g2),var(--g1),transparent);animation:shimmer 3s infinite;}
@keyframes shimmer{0%{opacity:.4;}50%{opacity:1;}100%{opacity:.4;}}
.sig-top{padding:26px 18px 20px;text-align:center;position:relative;}
.sig-lbl{font-size:.63rem;color:rgba(0,255,65,.5);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-weight:700;}
.sig-value{font-family:'Orbitron',monospace;font-size:5.5rem;font-weight:900;line-height:1;transition:all .4s;}
.sig-value.idle{color:rgba(0,255,65,.15);}
.sig-value.loading{color:rgba(0,255,65,.5);animation:blink .4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.sig-value.ready{color:var(--g1);text-shadow:0 0 30px rgba(0,255,65,.6),0 0 60px rgba(0,255,65,.3);}
.sig-instr{font-size:.84rem;color:rgba(0,255,65,.4);margin-top:9px;}
.sig-badge{display:inline-block;margin-top:11px;padding:5px 16px;border-radius:50px;font-size:.79rem;font-weight:700;}
.sig-badge.hi{background:rgba(0,255,65,.1);border:1px solid rgba(0,255,65,.3);color:var(--g1);}
.sig-badge.md{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.22);color:var(--gold);}

/* ALGO METERS */
.algo-section{display:none;padding:0 16px 14px;}
.algo-lbl{font-size:.6rem;color:rgba(0,255,65,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-weight:700;}
.algo-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.am{background:rgba(0,0,0,.4);border:1px solid rgba(0,255,65,.1);border-radius:9px;padding:8px 10px;}
.am-n{font-size:.6rem;color:rgba(0,255,65,.45);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.am-bar{height:3px;background:rgba(255,255,255,.05);border-radius:50px;overflow:hidden;}
.am-fill{height:100%;border-radius:50px;width:0%;transition:width .2s;}
.af1{background:linear-gradient(90deg,#00C853,#00FF41);}
.af2{background:linear-gradient(90deg,#00BCD4,#00E676);}
.af3{background:linear-gradient(90deg,#69F0AE,#00FF41);}
.af4{background:linear-gradient(90deg,#00E676,#00BCD4);}
.am-val{font-size:.63rem;color:var(--g2);margin-top:3px;font-family:'Orbitron',monospace;}

/* NUM STREAM */
.num-stream{display:none;margin:0 14px;font-family:'Orbitron',monospace;font-size:.52rem;color:rgba(0,255,65,.35);letter-spacing:.5px;overflow:hidden;height:20px;white-space:nowrap;background:rgba(0,0,0,.3);border-radius:6px;padding:3px 8px;}

/* PROGRESS */
.prog-wrap{display:none;padding:0 16px 12px;}
.prog-outer{height:3px;background:rgba(255,255,255,.04);border-radius:50px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--g3),var(--g1),var(--g4));background-size:200% 100%;border-radius:50px;width:0%;transition:width .08s;animation:pgm 2s linear infinite;box-shadow:0 0 8px rgba(0,255,65,.5);}
@keyframes pgm{0%{background-position:0%;}100%{background-position:200%;}}
.prog-info{display:flex;justify-content:space-between;font-size:.67rem;color:rgba(0,255,65,.45);margin-top:4px;}
.prog-phase{font-size:.62rem;color:var(--g2);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:1px;}

/* RESULT DETAILS */
.result-detail{display:none;border-top:1px solid rgba(0,255,65,.1);padding:12px 16px;}
.rd-title{font-size:.62rem;color:rgba(0,255,65,.5);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:9px;}
.rd-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px;}
